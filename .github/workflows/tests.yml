name: Tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install -r requirements-dev.txt
      - run: python -m pytest -q
      - run: python -m py_compile app/bluetooth_reset.py

  build-exe:
    runs-on: windows-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install pyinstaller==6.12.0
      - run: pyinstaller --noconfirm --clean --onefile --windowed --uac-admin --name "Bluetooth Reset" app/bluetooth_reset.py
      - uses: actions/upload-artifact@v4
        with:
          name: Bluetooth-Reset-Windows
          path: dist/Bluetooth Reset.exe
